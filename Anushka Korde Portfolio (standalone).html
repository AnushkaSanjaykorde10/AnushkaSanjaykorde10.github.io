document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"><span data-tile=\"\" style=\"width:64px;height:64px;border-radius:16px;background:#001E36;display:grid;place-items:center;color:#31A8FF;font-family:'Bricolage Grotesque';font-weight:800;font-size:22px;box-shadow:3px 3px 0 var(--ink);border:1.5px solid var(--ink);\">Ps<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;color:var(--ink2);\">Photoshop<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== CONNECT ===================== -->\n  <section id=\"connect\" style=\"max-width:var(--maxw);margin:0 auto;padding:96px 28px 70px;text-align:center;position:relative;\">\n    <span data-reveal=\"\" style=\"display:inline-block;font-family:'Caveat';font-weight:700;font-size:28px;color:var(--accent);transform:rotate(-3deg);\">✦ say hi<\u002Fspan>\n    <h2 data-reveal=\"\" id=\"resume\" style=\"font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(40px,7vw,86px);letter-spacing:-.025em;line-height:.98;margin:12px 0 0;\">\n      Let's make something<br>that <span style=\"color:var(--accent)\">feels alive<\u002Fspan>.\n    <\u002Fh2>\n    <p data-reveal=\"\" style=\"font-size:17px;color:var(--ink2);max-width:440px;margin:22px auto 0;\">Open to product &amp; UI/UX roles, freelance, and collaborations. Drop a line — I reply fast.<\u002Fp>\n    <div data-reveal=\"\" style=\"display:flex;justify-content:center;flex-wrap:wrap;gap:14px;margin-top:34px;\">\n      <a data-cta=\"\" href=\"mailto:hello@anushka.design\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#fff;font-weight:600;font-size:16px;border-radius:999px;padding:15px 28px;box-shadow:0 16px 30px -12px var(--accent);\">\n        <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"m22 7-10 6L2 7\"><\u002Fpath><\u002Fsvg>\n        Connect →\n      <\u002Fa>\n    <\u002Fdiv>\n    <div data-reveal=\"\" style=\"display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin-top:24px;\">\n      <a data-social=\"\" href=\"#\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--ink);border-radius:999px;padding:10px 18px;color:var(--ink);font-weight:600;font-size:14px;\">LinkedIn<\u002Fa>\n      <a data-social=\"\" href=\"#\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--ink);border-radius:999px;padding:10px 18px;color:var(--ink);font-weight:600;font-size:14px;\">Behance<\u002Fa>\n      <a data-social=\"\" href=\"#\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--ink);border-radius:999px;padding:10px 18px;color:var(--ink);font-weight:600;font-size:14px;\">Dribbble<\u002Fa>\n      <a data-social=\"\" href=\"#\" style=\"text-decoration:none;display:inline-flex;align-items:center;gap:8px;border:1.5px solid var(--ink);border-radius:999px;padding:10px 18px;color:var(--ink);font-weight:600;font-size:14px;\">Instagram<\u002Fa>\n    <\u002Fdiv>\n    <span style=\"position:absolute;left:8%;top:30%;animation:floaty 6s ease-in-out infinite;\"><svg width=\"30\" height=\"30\" viewBox=\"0 0 24 24\"><path d=\"M12 0 C13 8 16 11 24 12 C16 13 13 16 12 24 C11 16 8 13 0 12 C8 11 11 8 12 0Z\" fill=\"var(--accent2)\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n    <span style=\"position:absolute;right:9%;top:44%;animation:floaty2 7s ease-in-out infinite;\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\"><path d=\"M12 21s-7-4.6-9.3-9.2C1 8.5 2.8 5 6.1 5 8.2 5 9.6 6.3 12 9c2.4-2.7 3.8-4 5.9-4 3.3 0 5.1 3.5 3.4 6.8C19 16.4 12 21 12 21z\" fill=\"none\" stroke=\"var(--accent)\" stroke-width=\"1.8\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n  <\u002Fsection>\n\n  <footer style=\"border-top:1.5px solid color-mix(in srgb,var(--ink) 14%,transparent);\">\n    <div style=\"max-width:var(--maxw);margin:0 auto;padding:26px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;\">\n      <span style=\"font-size:13.5px;color:var(--ink2);\">© 2026 Anushka Korde · Designed with care, built to move.<\u002Fspan>\n      <span style=\"font-family:'Caveat';font-weight:600;font-size:18px;color:var(--ink2);\">you never have to chase what wants to stay ✦<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    this.rootRef = React.createRef();\n    this.state = { loaded:false, awake:false, dark:false, flipped:false };\n  }\n  sync(){\n    const r = this.rootRef.current;\n    if(!r) return;\n    const LIGHT = {'--bg':'#F3EBDC','--bg2':'#ECE0CC','--card':'#FBF6EC','--ink':'#211B14','--ink2':'#6F6354','--line':'#211B14','--accent':'#FF5A36','--accent2':'#F2B33A','--accent3':'#2C7C8C','--skin':'#F3C9A2'};\n    const DARK  = {'--bg':'#15110A','--bg2':'#1D170E','--card':'#1F1810','--ink':'#F3EBDC','--ink2':'#A89A84','--line':'#F3EBDC','--accent':'#FF6B4F','--accent2':'#FFC24D','--accent3':'#5FB6C7','--skin':'#E6B68C'};\n    const vars = this.state.dark ? DARK : LIGHT;\n    for(const k in vars) r.style.setProperty(k, vars[k]);\n    // theme icon swap\n    const sun = r.querySelector('[data-sun]'), moon = r.querySelector('[data-moon]');\n    if(sun) sun.style.display = this.state.dark ? 'none' : 'block';\n    if(moon) moon.style.display = this.state.dark ? 'block' : 'none';\n  }\n  revealHero(){\n    const r = this.rootRef.current; if(!r) return;\n    r.querySelectorAll('.heroItem').forEach((e, i) => {\n      this.cancelAnims(e);\n      try{ e.animate([{ opacity:0, transform:'translateY(24px)' },{ opacity:1, transform:'translateY(0)' }], { duration:900, delay:i*85, easing:'cubic-bezier(.2,0,0,1)' }); }catch(err){}\n    });\n  }\n  doFlip(){\n    const r = this.rootRef.current; if(!r) return;\n    const f = r.querySelector('[data-flip]'); if(!f) return;\n    const front = f.querySelector('[data-front]'), back = f.querySelector('[data-back]');\n    this.cancelAnims(f);\n    const flipped = this.state.flipped;\n    try{ f.animate([{ transform:'scaleX(1)' },{ transform:'scaleX(0.02)' },{ transform:'scaleX(1)' }], { duration:660, easing:'cubic-bezier(.45,0,.55,1)' }); }catch(err){}\n    clearTimeout(this._flipT);\n    this._flipT = setTimeout(() => {\n      if(front) front.style.opacity = flipped ? '0' : '1';\n      if(back) back.style.opacity = flipped ? '1' : '0';\n    }, 305);\n  }\n  componentDidMount(){\n    this.sync();\n    const back0 = this.rootRef.current && this.rootRef.current.querySelector('[data-back]');\n    if(back0){ this.cancelAnims(back0); back0.style.opacity = '0'; }\n    this._move = (e) => {\n      const r = this.rootRef.current; if(!r) return;\n      const nx = (e.clientX / window.innerWidth) - 0.5;\n      const ny = (e.clientY / window.innerHeight) - 0.5;\n      r.querySelectorAll('[data-pupil]').forEach((p) => {\n        const m = parseFloat(p.getAttribute('data-pupil')) || 6;\n        p.style.transform = 'translate(' + (nx*m) + 'px,' + (ny*m) + 'px)';\n      });\n      r.querySelectorAll('[data-depth]').forEach((el) => {\n        const d = parseFloat(el.getAttribute('data-depth')) || 12;\n        el.style.transform = 'translate3d(' + (-nx*d) + 'px,' + (-ny*d) + 'px,0)';\n      });\n    };\n    window.addEventListener('mousemove', this._move, { passive:true });\n    if('IntersectionObserver' in window && this.rootRef.current){\n      this._io = new IntersectionObserver((entries) => {\n        entries.forEach((en) => {\n          if(en.isIntersecting && !en.target._rv){\n            en.target._rv = true;\n            this.cancelAnims(en.target);\n            try{ en.target.animate([{ opacity:0, transform:'translateY(28px)' },{ opacity:1, transform:'translateY(0)' }], { duration:780, easing:'cubic-bezier(.2,0,0,1)' }); }catch(e){}\n            this._io.unobserve(en.target);\n          }\n        });\n      }, { threshold:0.01, rootMargin:'0px 0px -6% 0px' });\n      this.rootRef.current.querySelectorAll('[data-reveal]').forEach((el) => this._io.observe(el));\n    }\n    // safety: force-reveal any stragglers still hidden after load\n    this._fallback = setInterval(() => {\n      const root = this.rootRef.current; if(!root) return;\n      root.querySelectorAll('[data-reveal]').forEach((el) => {\n        if(el._rv) return;\n        const rect = el.getBoundingClientRect();\n        if(rect.top < window.innerHeight && rect.bottom > 0){\n          el._rv = true;\n          this.cancelAnims(el);\n          try{ el.animate([{ opacity:0, transform:'translateY(28px)' },{ opacity:1, transform:'translateY(0)' }], { duration:780, easing:'cubic-bezier(.2,0,0,1)' }); }catch(e){}\n        }\n      });\n    }, 600);\n  }\n  componentDidUpdate(){ this.sync(); }\n  componentWillUnmount(){\n    if(this._move) window.removeEventListener('mousemove', this._move);\n    if(this._io) this._io.disconnect();\n    if(this._t) clearTimeout(this._t);\n    if(this._fallback) clearInterval(this._fallback);\n  }\n  cancelAnims(el){ if(!el) return; try{ el.getAnimations().forEach((a) => { try{ a.cancel(); }catch(e){} }); }catch(e){} }\n  applyAwake(){\n    const r = this.rootRef.current; if(!r) return;\n    r.querySelectorAll('[data-eyeopen]').forEach((e) => { this.cancelAnims(e); e.style.opacity = '1'; });\n    r.querySelectorAll('[data-eyeclosed]').forEach((e) => { this.cancelAnims(e); e.style.opacity = '0'; });\n    r.querySelectorAll('[data-zzz]').forEach((e) => { this.cancelAnims(e); e.style.animation = 'none'; e.style.opacity = '0'; });\n    const y = r.querySelector('[data-yawn]'); if(y){ this.cancelAnims(y); y.style.animation = 'yawn 1.5s cubic-bezier(.2,0,0,1) .2s forwards'; }\n  }\n  hideLoader(){\n    const r = this.rootRef.current; if(!r) return;\n    const loader = r.querySelector('[data-loader]'); if(!loader) return;\n    if(this._hid) return; this._hid = true;\n    this.cancelAnims(loader);\n    loader.style.pointerEvents = 'none';\n    const a = loader.animate([{ opacity:1 },{ opacity:0 }], { duration:750, easing:'cubic-bezier(.2,0,0,1)', fill:'forwards' });\n    a.onfinish = () => { loader.style.display = 'none'; };\n    setTimeout(() => { loader.style.display = 'none'; }, 950);\n  }\n  wake = () => {\n    if(this.state.awake) return;\n    this.setState({ awake:true }, () => this.applyAwake());\n    this._t = setTimeout(() => this.setState({ loaded:true }, () => { this.hideLoader(); this.revealHero(); }), 1900);\n  };\n  enter = () => {\n    if(this._t) clearTimeout(this._t);\n    this.setState({ awake:true, loaded:true }, () => { this.applyAwake(); this.hideLoader(); this.revealHero(); });\n  };\n  toggleDark = () => this.setState((s) => ({ dark:!s.dark }));\n  toggleFlip = () => this.setState((s) => ({ flipped:!s.flipped }), () => this.doFlip());\n  renderVals(){\n    return {\n      rootRef: this.rootRef,\n      wake: this.wake,\n      enter: this.enter,\n      toggleDark: this.toggleDark,\n      toggleFlip: this.toggleFlip\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
